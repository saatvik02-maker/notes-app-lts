<!DOCTYPE html>
<html>
<head>
  <title>Notes-App</title>
</head>
<body>

<h2>Sign-up:</h2>
<input id="su_user" placeholder="username">
<input id="su_pass" type="password" placeholder="password">
<button onclick="signup()">Sign-up</button>

<h2>Login:</h2>
<input id="li_user" placeholder="username">
<input id="li_pass" type="password" placeholder="password">
<button onclick="login()">Login</button>

<p id="status"></p>

<h2>Add Note:</h2>
<input id="note">
<button onclick="addNote()">Add</button>

<ul id="notes"></ul>

<script>
let token = localStorage.getItem("token") || "";

// Signup
async function signup() {
  const res = await fetch("http://localhost:5000/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("su_user").value,
      password: document.getElementById("su_pass").value
    })
  });

  const data = await res.json();
  document.getElementById("status").innerText = data.message;
}

// Login
async function login() {
  const res = await fetch("http://localhost:5000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("li_user").value,
      password: document.getElementById("li_pass").value
    })
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("status").innerText = "❌ " + data.message;
    return;
  }

  token = data.token;
  localStorage.setItem("token", token);
  document.getElementById("status").innerText = "✅ " + data.message;

  getNotes();
}

// Add note
async function addNote() {
  const text = document.getElementById("note").value;

  if (!text) {
    alert("Note cannot be empty");
    return;
  }

  await fetch("http://localhost:5000/notes", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ text })
  });

  getNotes();
}

// Get notes
async function getNotes() {
  const res = await fetch("http://localhost:5000/notes", {
    headers: { "Authorization": token }
  });

  const data = await res.json();

  document.getElementById("notes").innerHTML =
    data.map(n => `
      <li>
        ${n.text} ${n.done ? "✅" : ""}
        <button onclick="toggleDone('${n._id}')">
          ${n.done ? "Undo" : "Done"}
        </button>
        <button onclick="deleteNote('${n._id}')">Delete</button>
      </li>
    `).join("");
}

// Toggle done
async function toggleDone(id) {
  await fetch(`http://localhost:5000/notes/${id}`, {
    method: "PUT",
    headers: { "Authorization": token }
  });

  getNotes();
}

// Delete note
async function deleteNote(id) {
  await fetch(`http://localhost:5000/notes/${id}`, {
    method: "DELETE",
    headers: { "Authorization": token }
  });

  getNotes();
}

// Auto login
if (token) {
  getNotes();
  document.getElementById("status").innerText = "Already logged in";
}
</script>

</body>
</html>
