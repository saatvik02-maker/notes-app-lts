services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    volumes:
    - ./frontend:/usr/share/nginx/html

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  mongo:
    image: mongo
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
